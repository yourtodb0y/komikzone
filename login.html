<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"/><title>Login Admin - KomikZone</title><link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/><style>
body{background:#121212;color:#fff;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.login-box{background:#1e1e1e;border:3px solid #ff3b30;padding:30px;border-radius:8px;width:300px;box-shadow:5px 5px 0 #000}
h2{font-family:'Bangers',cursive;color:#ffd60a;text-align:center;margin-bottom:20px;letter-spacing:1px}
input{width:100%;padding:10px;margin-bottom:15px;background:#2d2d2d;border:2px solid #444;border-radius:6px;color:#fff;box-sizing:border-box}
button{width:100%;padding:10px;background:#ff3b30;color:#fff;border:2px solid #000;font-weight:900;border-radius:6px;cursor:pointer;box-shadow:3px 3px 0 #000}
</style></head><body>
<div class="login-box">
  <h2>🔒 ADMIN LOGIN</h2>
  <form id="formLogin">
    <input type="text" id="user" placeholder="Username" required/>
    <input type="password" id="pass" placeholder="Password" required/>
    <button type="submit">MASUK PANEL</button>
  </form>
</div>
<script>
  document.getElementById('formLogin').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) { location.reload(); } 
      else { alert('Username / Password salah!'); }
    });
  });
</script>
</body></html>
