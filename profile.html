<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KomikZone - Profil Keren</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght=400;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root { --ink: #0d0d0d; --paper: #fefaf2; --accent: #ff3b30; --accent2: #ffd60a; --accent3: #0a84ff; --ps: 5px 5px 0px #0d0d0d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--paper); color: var(--ink); font-family: 'Nunito', sans-serif; min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center; }
        /* Efek bintik komik retro biar se-tema dengan index.html */
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, #d4c9b0 1px, transparent 1px); background-size: 20px 20px; opacity: .45; pointer-events: none; z-index: 0; }
        
        .profile-card-brutal { background: #fff; border: 4px solid var(--ink); box-shadow: var(--ps); border-radius: 12px; width: 100%; max-width: 450px; padding: 30px 20px; position: relative; z-index: 10; }
        .profile-close { position: absolute; top: 15px; right: 15px; background: var(--accent); color: white; border: 3px solid var(--ink); width: 32px; height: 32px; border-radius: 6px; font-weight: 900; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 2px 2px 0 var(--ink); }
        .profile-close:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
        
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; margin-top: 10px; }
        
        /* Bingkai Avatar Brutalism Bulat */
        .profile-avatar { 
            width: 95px; height: 95px; 
            background: #ffffff; border: 3.5px solid var(--ink); border-radius: 50%; 
            cursor: pointer; overflow: hidden; box-shadow: 3px 3px 0 var(--ink);
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; position: relative; flex-shrink: 0;
        }
        .profile-avatar::after { content: '📸'; position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; opacity: 0; transition: opacity 0.2s; }
        .profile-avatar:hover::after { opacity: 1; }
        
        .name-wrapper { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .profile-name { font-family: 'Bangers', cursive; font-size: 2.2rem; letter-spacing: 1px; color: var(--ink); text-transform: none; line-height: 1; } /* Sesuai request: TEXT-TRANSFORM NONE biar ga dipaksa capslock */
        .btn-edit-name { background: transparent; border: none; font-size: 1.1rem; cursor: pointer; padding: 2px; }
        .btn-edit-name:hover { transform: scale(1.2); }
        
        .profile-title { color: var(--accent3); font-size: 0.9rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        
        /* Menu navigasi internal bergaya list brutal */
        .profile-menu-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .menu-item-brutal { background: #fff; border: 3px solid var(--ink); border-radius: 8px; padding: 14px 16px; font-weight: 800; font-size: 0.95rem; text-decoration: none; color: var(--ink); display: flex; justify-content: space-between; align-items: center; box-shadow: 3px 3px 0 var(--ink); transition: 0.1s; }
        .menu-item-brutal:hover { background: var(--paper); transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
        
        .btn-logout { background: var(--accent); color: white; border: 3px solid var(--ink); width: 100%; padding: 12px; font-weight: 900; font-size: 1rem; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: var(--ps); margin-top: 25px; display: block; text-align: center; text-decoration: none; }
        .btn-logout:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
    </style>
</head>
<body>

<div class="profile-card-brutal">
    <a href="index.html" class="profile-close">✕</a>
    
    <div class="profile-header">
        <div class="profile-avatar" id="pAvatar">
            <input type="file" id="avatarFileInput" accept="image/*" style="display: none;">
        </div>
        <div>
            <div class="name-wrapper">
                <span class="profile-name" id="pNameText">Nama Kamu</span>
                <button class="btn-edit-name" onclick="ubahNamaUser()" title="Ubah Nama">✏️</button>
            </div>
            <div class="profile-title" id="pTitleText">Eksploror Pemula</div>
        </div>
    </div>
    
    <div class="profile-menu-list">
        <!-- Pindah halaman leveling terpisah -->
        <a href="leveling.html" class="menu-item-brutal">
            <span>⚔️ Quest & Leveling System</span>
            <span>➔</span>
        </a>
        <a href="#" onclick="alert('Fitur riwayat bacaan dalam pengembangan!')" class="menu-item-brutal">
            <span>📚 Riwayat Baca Komik</span>
            <span>➔</span>
        </a>
    </div>

    <button class="btn-logout" onclick="handleLogout()">🚪 KELUAR AKUN (LOGOUT)</button>
</div>

<script>
    let isLoggedIn = localStorage.getItem('uz_logged_in') === 'true';
    let currentUser = localStorage.getItem('uz_active_user') || "Nama Kamu";
    let userLevel = parseInt(localStorage.getItem('uz_level')) || 1;
    const pangkatList = ["Eksploror Pemula", "Pembaca Setia", "Pecandu Komik", "Elite Otaku", "Shadow Monarch"];

    function initProfil() {
        if (!isLoggedIn) {
            window.location.href = "auth.html?blocked=true";
            return;
        }

        // Tampilkan nama asli sesuai inputan (tidak dipaksa uppercase/capslock lewat CSS)
        document.getElementById('pNameText').textContent = currentUser;
        
        let rawPkt = localStorage.getItem("cfg_pangkat_custom") || "Newbie, Pemula Rendah, Pecandu Komik, Elite Otaku, Shadow Monarch"; let pktArr = rawPkt.split(",").map(i => i.trim()); let pangkatIndex = Math.min(userLevel - 1, pktArr.length - 1);
        document.getElementById('pTitleText').textContent = pktArr[pangkatIndex] || "Petualang";

        // Load Avatar kustom galeri
        const savedPhoto = localStorage.getItem(`uz_avatar_${currentUser.toLowerCase()}`);
        if (savedPhoto) {
            document.getElementById('pAvatar').style.background = `url('${savedPhoto}')`;
            document.getElementById('pAvatar').style.backgroundSize = 'cover';
            document.getElementById('pAvatar').style.backgroundPosition = 'center';
        } else {
            document.getElementById('pAvatar').style.background = '#ffd60a'; // Default warna kuning brutalism jika kosong
        }
    }

    // Fungsi Ubah Nama Kustom Tanpa Paksaan Capslock
    function ubahNamaUser() {
        let lama = localStorage.getItem('uz_active_user') || currentUser;
        let baru = prompt("Masukkan Nama Profil Baru Anda:", lama);
        
        if (baru && baru.trim() !== "") {
            let namaBersih = baru.trim(); // Simpan mentah-mentah sesuai ketikan user
            
            // Update database user lokal agar tidak konflik saat reload
            let registeredUsers = JSON.parse(localStorage.getItem('uz_users_db')) || {};
            if(registeredUsers[lama.toLowerCase()]) {
                let dataLama = registeredUsers[lama.toLowerCase()];
                delete registeredUsers[lama.toLowerCase()]; // hapus key lama
                registeredUsers[namaBersih.toLowerCase()] = { username: namaBersih, password: dataLama.password };
                localStorage.setItem('uz_users_db', JSON.stringify(registeredUsers));
            }

            localStorage.setItem('uz_active_user', namaBersih);
            currentUser = namaBersih;
            document.getElementById('pNameText').textContent = namaBersih;
            alert("✅ Nama berhasil diperbarui!");
            initProfil();
        }
    }

    // Sistem upload galeri HP
    const avatarBox = document.getElementById('pAvatar');
    const fileInp = document.getElementById('avatarFileInput');

    avatarBox.addEventListener('click', () => { fileInp.click(); });
    fileInp.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert("Maksimal ukuran file 2MB!"); return; }

        const reader = new FileReader();
        reader.onload = function(event) {
            const base64 = event.target.result;
            localStorage.setItem(`uz_avatar_${currentUser.toLowerCase()}`, base64);
            avatarBox.style.background = `url('${base64}')`;
            avatarBox.style.backgroundSize = 'cover';
            avatarBox.style.backgroundPosition = 'center';
        };
        reader.readAsDataURL(file);
    });

    function handleLogout() {
        if (confirm("Yakin ingin logout dari akun?")) {
            localStorage.setItem('uz_logged_in', 'false');
            localStorage.setItem('uz_active_user', '');
            window.location.href = "index.html";
        }
    }

    initProfil();
</script>
</body>
</html>
